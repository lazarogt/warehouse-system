<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>warehouse-system</title>
    <style>
      :root {
        color: #ffffff;
        background: #08111f;
      }

      body {
        margin: 0;
      }

      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(125, 211, 199, 0.18), transparent 28%),
          linear-gradient(135deg, rgba(249, 115, 22, 0.14), transparent 38%),
          #08111f;
        transition:
          opacity 180ms ease,
          visibility 180ms ease;
      }

      #app-loading[data-state="exit"] {
        opacity: 0;
        visibility: hidden;
      }

      #app-loading__panel {
        display: flex;
        min-width: 280px;
        align-items: center;
        gap: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 1.1rem 1.25rem;
        background: rgba(8, 17, 31, 0.82);
        box-shadow: 0 24px 80px rgba(8, 17, 31, 0.26);
        backdrop-filter: blur(12px);
      }

      #app-loading__spinner {
        width: 2.75rem;
        height: 2.75rem;
        border: 2px solid rgba(255, 255, 255, 0.14);
        border-top-color: #7dd3c7;
        border-radius: 9999px;
        animation: warehouse-spin 0.9s linear infinite;
      }

      #app-loading__eyebrow {
        margin: 0;
        font:
          600 0.72rem/1.1 "Trebuchet MS",
          "Segoe UI",
          sans-serif;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #f97316;
      }

      #app-loading__title {
        margin: 0.45rem 0 0;
        font:
          600 1.05rem/1.3 "Trebuchet MS",
          "Segoe UI",
          sans-serif;
        color: #ffffff;
      }

      #app-loading__copy {
        margin: 0.3rem 0 0;
        font:
          400 0.92rem/1.5 "Trebuchet MS",
          "Segoe UI",
          sans-serif;
        color: #cbd5e1;
      }

      @keyframes warehouse-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-loading {
          transition: none;
        }

        #app-loading__spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loading" aria-hidden="true">
      <div id="app-loading__panel">
        <div id="app-loading__spinner"></div>
        <div>
          <p id="app-loading__eyebrow">Desktop</p>
          <p id="app-loading__title">Inicializando warehouse-system</p>
          <p id="app-loading__copy">Cargando interfaz, sesión y servicios locales…</p>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
