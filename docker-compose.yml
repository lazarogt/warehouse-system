services:
  client:
    build:
      context: .
      dockerfile: ./docker/client/Dockerfile
    container_name: warehouse-system-client
    environment:
      VITE_PORT: ${CLIENT_PORT}
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://server:3000}
    ports:
      - "${CLIENT_PORT}:5173"
    depends_on:
      server:
        condition: service_started

  server:
    build:
      context: .
      dockerfile: ./docker/server/Dockerfile
    container_name: warehouse-system-server
    environment:
      NODE_ENV: development
      SERVER_PORT: ${SERVER_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SQLITE_DB_PATH: /data/database.db
      JWT_SECRET: ${JWT_SECRET:-warehouse-system-dev-secret}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-administrador}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
    ports:
      - "${SERVER_PORT}:3000"
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
